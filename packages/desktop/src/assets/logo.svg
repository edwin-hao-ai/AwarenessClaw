    </linearGradient>
    <radialGradient id="dotFill" cx="200" cy="168" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="0.5" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#0EA5E9"/>
